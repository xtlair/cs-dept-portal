<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Sign Up | CS Department</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="navbar">
  <div class="brand">
    Sankara College of Science and Commerce
    <small>Department of Computer Science</small>
  </div>
  <nav>
    <a href="/index.html">Events</a>
    <a href="/student-login.html">Student Login</a>
  </nav>
</div>

<div class="container narrow">
  <div class="card">
    <h2>Create Student Account</h2>
    <p class="muted">Sign up to register for department events.</p>
    <div id="alertBox" class="alert hidden"></div>

    <form id="signupForm">
      <label for="name">Full Name</label>
      <input type="text" id="name" required>

      <label for="email">College Email</label>
      <input type="email" id="email" required>

      <div class="field-row">
        <div>
          <label for="department">Department</label>
          <select id="department" required>
            <option value="">Select</option>
            <option>Computer Science</option>
            <option>Computer Applications</option>
            <option>Information Technology</option>
            <option>Commerce</option>
            <option>Other</option>
          </select>
        </div>
        <div>
          <label for="year">Year</label>
          <select id="year" required>
            <option value="">Select</option>
            <option>1st Year</option>
            <option>2nd Year</option>
            <option>3rd Year</option>
          </select>
        </div>
      </div>

      <div class="field-row">
        <div>
          <label for="roll_number">Roll Number (optional)</label>
          <input type="text" id="roll_number">
        </div>
        <div>
          <label for="phone">Phone (optional)</label>
          <input type="text" id="phone">
        </div>
      </div>

      <label for="password">Password</label>
      <input type="password" id="password" required minlength="6">
      <p class="muted" style="font-size:0.8rem;margin-top:4px;">At least 6 characters.</p>

      <div class="btn-row">
        <button type="submit" class="btn">Create Account</button>
        <a href="/student-login.html" class="btn secondary">I already have an account</a>
      </div>
    </form>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
document.getElementById('signupForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  hideAlert('alertBox');

  const payload = {
    name: document.getElementById('name').value,
    email: document.getElementById('email').value,
    department: document.getElementById('department').value,
    year: document.getElementById('year').value,
    roll_number: document.getElementById('roll_number').value,
    phone: document.getElementById('phone').value,
    password: document.getElementById('password').value,
  };

  try {
    await apiCall('/api/student/signup', 'POST', payload);
    window.location.href = '/student-dashboard.html';
  } catch (err) {
    showAlert('alertBox', err.message);
  }
});
</script>
</body>
</html>

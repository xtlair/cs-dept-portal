<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login | CS Department</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="navbar">
  <div class="brand">
    Sankara College of Science and Commerce
    <small>Department of Computer Science</small>
  </div>
  <nav>
    <a href="/index.html">Events</a>
    <a href="/student-login.html">Student Login</a>
  </nav>
</div>

<div class="container narrow">
  <div class="card">
    <h2>Admin Login</h2>
    <p class="muted">For department staff managing events and registrations.</p>
    <div id="alertBox" class="alert hidden"></div>

    <form id="loginForm">
      <label for="email">Email</label>
      <input type="email" id="email" required>

      <label for="password">Password</label>
      <input type="password" id="password" required>

      <div class="btn-row">
        <button type="submit" class="btn">Log In</button>
      </div>
    </form>
    <p class="muted" style="font-size:0.8rem;margin-top:16px;">
      No admin account yet? Run <code>npm run seed-admin</code> on the server to create the first one.
    </p>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  hideAlert('alertBox');
  try {
    await apiCall('/api/admin/login', 'POST', {
      email: document.getElementById('email').value,
      password: document.getElementById('password').value,
    });
    window.location.href = '/admin-dashboard.html';
  } catch (err) {
    showAlert('alertBox', err.message);
  }
});
</script>
</body>
</html>
